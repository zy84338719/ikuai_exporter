version: "3.8"

services:
  ikuai-exporter:
    image: ghcr.io/zy84338719/ikuai_exporter:latest
    container_name: ikuai-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - -router=http://192.168.1.1
      - -username=admin
      - -password=admin
      - -listen=:9100
      - -namespace=ikuai

  # 可选：同时监控多个路由器（v3/v4 参数相同）
